# Tidyboard configuration — YAML format
# maintained by infra + backend agents; keep in sync
#
# Copy to config.yaml and fill in secrets.
# All values can be overridden by environment variables (TIDYBOARD_* prefix).
# See internal/config/config.go for the full Kong struct definition.

# HTTP server settings
server:
  host: 0.0.0.0          # interface to bind; use 127.0.0.1 behind a reverse proxy
  port: 8080              # HTTP listen port
  mode: standalone        # standalone | lambda
  cors-origins:           # allowed CORS origins (strict whitelist — no wildcard)
    - http://localhost:3000
  read-timeout: 30s       # maximum duration for reading the full request
  write-timeout: 30s      # maximum duration for writing the full response
  shutdown-timeout: 10s   # graceful shutdown wait time
  metrics-enabled: true   # expose GET /metrics (Prometheus); set false on Lambda
  metrics-allowed-ips: [] # empty = open to all; add IPs to restrict scraping
                          # e.g. ["10.0.0.5", "192.168.1.100"]
  max-request-body-bytes: 1048576  # 1 MB default; /v1/media/upload uses 10 MB

# PostgreSQL connection
database:
  host: localhost          # env: TIDYBOARD_DATABASE_HOST
  port: 5432              # env: TIDYBOARD_DATABASE_PORT
  name: tidyboard         # env: TIDYBOARD_DATABASE_NAME
  user: tidyboard         # env: TIDYBOARD_DATABASE_USER
  password: ""            # env: TIDYBOARD_DATABASE_PASSWORD — required; never hardcode
  ssl-mode: disable        # disable | require | verify-ca | verify-full
  max-open-conns: 25      # max total connections in the pool
  max-idle-conns: 5       # max idle connections kept open
  conn-max-lifetime: 15m  # connections older than this are recycled
  migrations-dir: ./migrations  # path to goose migration files

# Redis connection (WebSocket pub/sub, rate limiting, session cache)
redis:
  host: localhost          # env: TIDYBOARD_REDIS_HOST
  port: 6379              # env: TIDYBOARD_REDIS_PORT
  password: ""            # env: TIDYBOARD_REDIS_PASSWORD — leave empty for no auth
  db: 0                   # Redis database index (0–15)
  max-retries: 3          # reconnect attempts before giving up

# JWT and PIN authentication
auth:
  jwt-secret: ""          # env: TIDYBOARD_AUTH_JWT_SECRET — required; generate with: openssl rand -base64 64
  jwt-expiry: 15m         # access token lifetime
  refresh-token-expiry: 168h  # 7 days; refresh token lifetime
  pin-max-attempts: 5     # failed PINs before lockout
  pin-lockout-duration: 5m
  rate-limit-per-min: 60  # max API requests per authenticated account per minute (Redis-backed)
  oauth:
    google-enabled: false
    google-client-id: ""  # env: TIDYBOARD_AUTH_OAUTH_GOOGLE_CLIENT_ID
    google-client-secret: ""  # env: TIDYBOARD_AUTH_OAUTH_GOOGLE_CLIENT_SECRET
    apple-enabled: false
    apple-client-id: ""
    apple-team-id: ""

# CalDAV sync settings (used by Python sync-worker)
sync:
  poll-interval: 5m       # how often to pull remote calendars
  max-retries: 3
  retry-backoff: 30s

# File storage (recipe images, avatars, etc.)
storage:
  type: local             # local | s3
  local-path: ./data/media
  # public_base_url is used by local mode to build the URL returned to clients.
  # Must match the public address of the Go server + /media/ suffix.
  public-base-url: http://localhost:8080/media/
  s3-bucket: ""           # required when type=s3  env: (set via AWS_* env vars or IAM role)
  s3-region: us-east-1
  s3-prefix: media/
  # s3_endpoint: http://localhost:9000   # MinIO local dev — uncomment when using MinIO
  # s3_force_path_style: true            # required for MinIO

# Push/email notifications (all optional)
notifications:
  ntfy-enabled: false
  ntfy-server-url: https://ntfy.sh
  ntfy-topic-prefix: tidyboard-
  email-enabled: false
  smtp-host: ""
  smtp-port: 587
  smtp-user: ""           # env: TIDYBOARD_NOTIFY_SMTP_USER
  smtp-password: ""       # env: TIDYBOARD_NOTIFY_SMTP_PASSWORD
  smtp-from: ""

# AI features — BYOK only; Tidyboard never pays for AI
ai:
  enabled: false
  ocr-enabled: false
  tesseract-path: tesseract

# Automated backups (pg_dump)
backup:
  enabled: true
  schedule: "0 3 * * *"  # 3 AM daily (cron syntax)
  retention: 7            # number of daily backup files to keep
  local-path: ./data/backups
  s3-enabled: false
  s3-bucket: ""

# Recipe import settings
recipes:
  max-import-size: 5242880  # 5 MB max HTML to download for scraping
  image-download: true      # cache recipe images locally
  scraper-timeout: 15s      # HTTP timeout when fetching recipe pages
