name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: git short SHA)"
        required: false
        default: ""

permissions:
  id-token: write   # required for OIDC JWT
  contents: read

env:
  AWS_REGION: us-east-1
  # Set these in GitHub repo Settings → Secrets and variables → Actions:
  #   AWS_ROLE_ARN  — ARN of the IAM role the OIDC provider can assume
  #   ECR_REGISTRY  — <account>.dkr.ecr.<region>.amazonaws.com

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      # ── OIDC auth — no long-lived credentials ─────────────────────────────
      # Prerequisites (one-time setup):
      #   1. Create an IAM OIDC provider for token.actions.githubusercontent.com
      #      (see deploy/aws/README.md § GitHub Actions OIDC)
      #   2. Create an IAM role with the OIDC provider as a trusted entity
      #      and attach permissions for ECR push + ECS update-service.
      #   3. Set AWS_ROLE_ARN in GitHub Secrets.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and push all four images ────────────────────────────────────
      - name: Build and push — Go server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-server:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-server:latest
          cache-from: type=gha,scope=server
          cache-to:   type=gha,scope=server,mode=max

      - name: Build and push — Next.js web
        uses: docker/build-push-action@v5
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-web:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-web:latest
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

      - name: Build and push — sync-worker
        uses: docker/build-push-action@v5
        with:
          context: services/sync-worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-sync-worker:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-sync-worker:latest
          cache-from: type=gha,scope=sync-worker
          cache-to:   type=gha,scope=sync-worker,mode=max

      - name: Build and push — recipe-scraper
        uses: docker/build-push-action@v5
        with:
          context: services/recipe-scraper
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-recipe-scraper:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/tidyboard-recipe-scraper:latest
          cache-from: type=gha,scope=recipe-scraper
          cache-to:   type=gha,scope=recipe-scraper,mode=max

      # ── Force ECS redeployments ───────────────────────────────────────────
      - name: Force ECS redeployments
        run: |
          CLUSTER="tidyboard-prod"
          for SVC in server web sync-worker recipe-scraper; do
            echo "Redeploying ${CLUSTER}-${SVC}..."
            aws ecs update-service \
              --region "$AWS_REGION" \
              --cluster "$CLUSTER" \
              --service "${CLUSTER}-${SVC}" \
              --force-new-deployment \
              --query 'service.serviceName' \
              --output text
          done

      - name: Summary
        run: |
          echo "### Deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: ${{ steps.tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region**: ${{ env.AWS_REGION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Services redeployed**: server, web, sync-worker, recipe-scraper" >> "$GITHUB_STEP_SUMMARY"
