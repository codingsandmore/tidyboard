---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-build-test:
    name: Web — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Check coverage threshold (statements >= 89%)
        run: |
          PCT=$(jq '.total.statements.pct' coverage/coverage-summary.json)
          echo "Statement coverage: ${PCT}%"
          if [ "$(echo "${PCT} < 89" | bc -l)" = "1" ]; then
            echo "ERROR: coverage ${PCT}% is below the 89% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
          retention-days: 14

  go-lint-test:
    name: Go — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tidyboard_test
          POSTGRES_USER: tidyboard
          POSTGRES_PASSWORD: tidyboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tidyboard -d tidyboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -tags=unit -p 1 -count=1 -race ./...

      - name: Integration tests
        env:
          TIDYBOARD_TEST_DSN: >-
            postgres://tidyboard:tidyboard_test@localhost:5432/tidyboard_test?sslmode=disable
        run: go test -tags=integration -p 1 -count=1 -race ./...

  python-test:
    name: Python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - sync-worker
          - recipe-scraper

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -m "not integration" -p no:parallel -x -v

  web-e2e:
    name: Web — Playwright E2E
    runs-on: ubuntu-latest
    needs: [web-build-test]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        env:
          NEXT_PUBLIC_API_URL: ''
        run: npm run e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: web/test-results/
          retention-days: 7

  docker-build:
    name: Docker — validate & build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose config

      - name: Build Go server image
        run: |
          docker build \
            --file Dockerfile \
            --tag tidyboard/server:ci \
            .

      - name: Build sync-worker image
        run: |
          docker build \
            --file services/sync-worker/Dockerfile \
            --tag tidyboard/sync-worker:ci \
            services/sync-worker

      - name: Build recipe-scraper image
        run: |
          docker build \
            --file services/recipe-scraper/Dockerfile \
            --tag tidyboard/recipe-scraper:ci \
            services/recipe-scraper
