---
# Deploy web/ to Vercel on every push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — Personal Access Token from vercel.com/account/tokens
#   VERCEL_ORG_ID      — Found in your Vercel team/project settings (orgId)
#   VERCEL_PROJECT_ID  — Found in Vercel project settings (projectId)
#
# To disable this workflow without deleting it, add a branch filter that
# never matches, or set an environment protection rule that requires approval.

name: Deploy Web to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Vercel production deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: web
          vercel-args: "--prod"
