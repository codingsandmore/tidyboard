name: Deploy to EC2

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    environment: production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/tidyboard

            echo "==> Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "==> Ensuring production auth rate limit..."
            if grep -q '^TIDYBOARD_AUTH_RATE_LIMIT_PER_MIN=' .env; then
              sed -i 's/^TIDYBOARD_AUTH_RATE_LIMIT_PER_MIN=.*/TIDYBOARD_AUTH_RATE_LIMIT_PER_MIN=300/' .env
            else
              printf '\nTIDYBOARD_AUTH_RATE_LIMIT_PER_MIN=300\n' >> .env
            fi

            # Ensure swap exists. The t4g.small only has 2GB RAM and a
            # parallel `docker compose up --build` of all services has
            # OOM-killed sshd / dockerd in the past (see project memory:
            # project_path_c_box_ooms_on_full_build.md). Add a 4GB swap on
            # first run and keep it across reboots via /etc/fstab.
            if [ ! -f /swapfile ]; then
              echo "==> Provisioning 4GB swapfile (one-time)..."
              sudo fallocate -l 4G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            else
              # Make sure it's actually swapped on (e.g. after fresh reboot
              # where the fstab entry should auto-mount).
              swapon --show=NAME | grep -q '^/swapfile$' || sudo swapon /swapfile
            fi
            free -m | head -3

            # The EC2 host has limited disk. Clear Docker build cache and
            # unused images before rebuilding so npm dependency layers do not
            # fail with ENOSPC. Do not prune volumes; production data lives in
            # Docker volumes.
            echo "==> Docker disk usage before prune..."
            docker system df

            echo "==> Pruning Docker build cache and unused images..."
            docker builder prune -af
            docker image prune -af

            echo "==> Docker disk usage after prune..."
            docker system df

            # Build services one at a time to keep peak RSS below the 2GB
            # limit + swap headroom. `docker compose build` builds without
            # restarting; the subsequent `up -d` only restarts containers
            # that actually changed.
            echo "==> Building tidyboard (Go)..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build tidyboard

            echo "==> Building web (Next.js)..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build web

            echo "==> Starting services..."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              up -d --remove-orphans

            echo "==> Waiting for postgres health..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                   exec -T postgres pg_isready -U tidyboard >/dev/null 2>&1; then
                echo "postgres ready"
                break
              fi
              sleep 2
            done

            echo "==> Applying database migrations (goose up)..."
            # The migrator service is in the `migrate` profile so it does not
            # run on every `up`. We invoke it explicitly here, after postgres
            # is healthy. Idempotent: goose skips already-applied migrations.
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              --profile migrate run --rm migrator

            echo "==> Pruning unused images..."
            docker image prune -f

            echo "==> Deploy complete."
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.prod.yml \
              ps
