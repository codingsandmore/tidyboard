---
version: 2

updates:
  # npm — web frontend
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - javascript

  # Go modules — backend
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - go

  # pip — sync-worker service
  - package-ecosystem: pip
    directory: /services/sync-worker
    schedule:
      interval: daily
    groups:
      pip-sync-worker-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python

  # pip — recipe-scraper service
  - package-ecosystem: pip
    directory: /services/recipe-scraper
    schedule:
      interval: daily
    groups:
      pip-recipe-scraper-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - github-actions
